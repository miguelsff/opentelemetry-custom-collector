services:
  otel-collector:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        GO_VERSION: ${GO_VERSION:-1.25.8}
        OCB_VERSION: ${OCB_VERSION:-0.148.0}
    image: ${COLLECTOR_IMAGE_NAME:-otelcol-custom}:latest
    container_name: ${COLLECTOR_CONTAINER_NAME:-otelcol-custom}
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${OTEL_GRPC_PORT:-4317}:4317"
      - "${OTEL_HTTP_PORT:-4318}:4318"
      - "${OTEL_HEALTH_PORT:-13133}:13133"
