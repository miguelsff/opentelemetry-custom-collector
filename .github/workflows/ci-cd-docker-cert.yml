name: "CI/CD: Cert (QA)"

on:
  push:
    branches: ["release/**"]

permissions:
  contents: write

jobs:
  # --- CI Stages ---

  prepare:
    uses: ./.github/workflows/_prepare.yml

  start-release:
    needs: [prepare]
    uses: ./.github/workflows/_start-release.yml
    with:
      branch: ${{ needs.prepare.outputs.branch }}
      short-sha: ${{ needs.prepare.outputs.short-sha }}

  build-test:
    needs: [start-release]
    uses: ./.github/workflows/_build-test.yml

  sast:
    needs: [build-test]
    uses: ./.github/workflows/_sast-analysis.yml

  qa:
    needs: [build-test]
    uses: ./.github/workflows/_qa-analysis.yml

  upload:
    needs: [prepare, sast, qa]
    uses: ./.github/workflows/_upload-artifacts.yml
    with:
      environment: qa
      image-tag: qa-${{ needs.prepare.outputs.short-sha }}
      commit-sha: ${{ needs.prepare.outputs.commit-sha }}
      branch: ${{ needs.prepare.outputs.branch }}
      author: ${{ needs.prepare.outputs.author }}
      timestamp: ${{ needs.prepare.outputs.timestamp }}
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}

  sca:
    needs: [upload]
    uses: ./.github/workflows/_sca-analysis.yml
    with:
      image-reference: ${{ needs.upload.outputs.image-reference }}

  # --- CD Stage ---

  deploy:
    needs: [prepare, sca]
    uses: ./.github/workflows/_deploy.yml
    with:
      environment: qa
      image-tag: qa-${{ needs.prepare.outputs.short-sha }}
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      OTLP_EXPORT_ENDPOINT: ${{ secrets.OTLP_EXPORT_ENDPOINT }}
      OTLP_BEARER_TOKEN: ${{ secrets.OTLP_BEARER_TOKEN }}

  # --- Traceability ---

  summary:
    if: always()
    needs: [prepare, start-release, build-test, sast, qa, upload, sca, deploy]
    runs-on: ubuntu-latest
    steps:
      - name: Pipeline Summary
        run: |
          echo "## Pipeline Traceability" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Project | ${{ needs.prepare.outputs.project }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Application | ${{ needs.prepare.outputs.application }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | ${{ needs.prepare.outputs.branch }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ needs.prepare.outputs.commit-sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Author | ${{ needs.prepare.outputs.author }} |" >> $GITHUB_STEP_SUMMARY
          echo "| RC Tag | ${{ needs.start-release.outputs.rc-tag }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Timestamp | ${{ needs.prepare.outputs.timestamp }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Stage Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Start Release | ${{ needs.start-release.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build & Test | ${{ needs.build-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| SAST Analysis | ${{ needs.sast.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| QA Analysis | ${{ needs.qa.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Upload Artifacts | ${{ needs.upload.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| SCA Analysis | ${{ needs.sca.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Deploy | ${{ needs.deploy.result }} |" >> $GITHUB_STEP_SUMMARY
