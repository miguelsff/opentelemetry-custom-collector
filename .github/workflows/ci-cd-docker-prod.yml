name: "CI/CD: Prod"

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  # --- CI Stages ---

  prepare:
    uses: ./.github/workflows/_prepare.yml

  promote:
    needs: [prepare]
    uses: ./.github/workflows/_promote-release.yml
    with:
      environment: prod
      short-sha: ${{ needs.prepare.outputs.short-sha }}
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}

  # --- CD Stage ---

  deploy:
    needs: [promote]
    uses: ./.github/workflows/_deploy.yml
    with:
      environment: prod
      image-tag: ${{ needs.promote.outputs.prod-image-tag }}
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      OTLP_EXPORT_ENDPOINT: ${{ secrets.OTLP_EXPORT_ENDPOINT }}
      OTLP_BEARER_TOKEN: ${{ secrets.OTLP_BEARER_TOKEN }}

  # --- Traceability ---

  summary:
    if: always()
    needs: [prepare, promote, deploy]
    runs-on: ubuntu-latest
    steps:
      - name: Pipeline Summary
        run: |
          echo "## Pipeline Traceability" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Project | ${{ needs.prepare.outputs.project }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Application | ${{ needs.prepare.outputs.application }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | ${{ needs.prepare.outputs.branch }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ needs.prepare.outputs.commit-sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Author | ${{ needs.prepare.outputs.author }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Prod Image | ${{ needs.promote.outputs.prod-image-tag }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Timestamp | ${{ needs.prepare.outputs.timestamp }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Stage Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Promote Release | ${{ needs.promote.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Deploy | ${{ needs.deploy.result }} |" >> $GITHUB_STEP_SUMMARY
