name: "Stage: QA Analysis"

on:
  workflow_call:
    outputs:
      quality-gate-status:
        description: "Quality gate result (pass/fail)"
        value: ${{ jobs.qa.outputs.quality-gate-status }}

jobs:
  qa:
    name: QA Analysis (SonarQube)
    runs-on: ubuntu-latest
    outputs:
      quality-gate-status: ${{ steps.scan.outputs.quality-gate-status }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/qa-sonarqube
        id: scan
      - uses: actions/upload-artifact@v4
        with:
          name: qa-report
          path: qa-report-mockup.json
          retention-days: 30
