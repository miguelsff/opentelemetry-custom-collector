name: Setup Azure OIDC

on:
  workflow_dispatch:
    inputs:
      github_repo:
        description: "GitHub repo (owner/name)"
        required: true
        type: string
      app_display_name:
        description: "Azure AD App Registration name"
        required: false
        type: string
        default: "github-otelcol-deployer"

permissions:
  id-token: write
  contents: read

jobs:
  setup:
    name: Create App Registration + Federated Credentials
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Create App Registration and Federated Credentials
        run: |
          set -euo pipefail

          APP_NAME="${{ inputs.app_display_name }}"
          REPO="${{ inputs.github_repo }}"

          echo "=== Checking if App Registration exists: $APP_NAME ==="
          EXISTING_APP_ID=$(az ad app list --display-name "$APP_NAME" --query "[0].appId" -o tsv 2>/dev/null || true)

          if [ -n "$EXISTING_APP_ID" ] && [ "$EXISTING_APP_ID" != "None" ]; then
            APP_ID="$EXISTING_APP_ID"
            echo "App Registration already exists. App ID: $APP_ID"
          else
            echo "Creating App Registration: $APP_NAME"
            APP_ID=$(az ad app create --display-name "$APP_NAME" --query appId -o tsv)
            echo "Created App ID: $APP_ID"
          fi

          echo "=== Ensuring Service Principal exists ==="
          az ad sp create --id "$APP_ID" 2>/dev/null || echo "Service Principal already exists"
          SP_OBJECT_ID=$(az ad sp show --id "$APP_ID" --query id -o tsv)

          echo "=== Assigning Contributor role ==="
          SUBSCRIPTION_ID=$(az account show --query id -o tsv)
          az role assignment create \
            --assignee-object-id "$SP_OBJECT_ID" \
            --assignee-principal-type ServicePrincipal \
            --role Contributor \
            --scope "/subscriptions/$SUBSCRIPTION_ID" 2>/dev/null \
            || echo "Role assignment already exists"

          echo "=== Creating Federated Credentials ==="
          for BRANCH in develop main; do
            CRED_NAME="github-${BRANCH//\//-}"
            if az ad app federated-credential show --id "$APP_ID" --federated-credential-id "$CRED_NAME" &>/dev/null; then
              echo "Credential '$CRED_NAME' already exists, skipping."
            else
              echo "Creating credential for branch: $BRANCH"
              az ad app federated-credential create --id "$APP_ID" --parameters "{
                \"name\": \"$CRED_NAME\",
                \"issuer\": \"https://token.actions.githubusercontent.com\",
                \"subject\": \"repo:${REPO}:ref:refs/heads/${BRANCH}\",
                \"audiences\": [\"api://AzureADTokenExchange\"]
              }"
            fi
          done

          # Wildcard for release/* branches
          if az ad app federated-credential show --id "$APP_ID" --federated-credential-id "github-release" &>/dev/null; then
            echo "Credential 'github-release' already exists, skipping."
          else
            echo "Creating credential for release branches"
            az ad app federated-credential create --id "$APP_ID" --parameters "{
              \"name\": \"github-release\",
              \"issuer\": \"https://token.actions.githubusercontent.com\",
              \"subject\": \"repo:${REPO}:ref:refs/heads/release/*\",
              \"audiences\": [\"api://AzureADTokenExchange\"]
            }"
          fi

          echo ""
          echo "============================================"
          echo "  SETUP COMPLETE"
          echo "============================================"
          echo ""
          echo "Add these secrets to each GitHub Environment (dev, qa, prod):"
          echo ""
          echo "  AZURE_CLIENT_ID:       $APP_ID"
          echo "  AZURE_TENANT_ID:       $(az account show --query tenantId -o tsv)"
          echo "  AZURE_SUBSCRIPTION_ID: $SUBSCRIPTION_ID"
          echo ""
          echo "============================================"
